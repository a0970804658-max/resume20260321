<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>個人履歷</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #e5e5e5;
}

/* 整體 */
.container {
  display: flex;
  max-width: 1000px;
  margin: 40px auto;
  background: white;
}

/* 左側灰色欄 */
.sidebar {
  width: 35%;
  background: #d9d9d9;
  padding: 30px 20px;
  box-sizing: border-box;
}

.profile-pic {
  width: 100%;
  height: 250px;
  object-fit: cover;
  margin-bottom: 20px;
}

/* 左側標題 */
.sidebar h3 {
  margin-top: 30px;
  font-size: 16px;
  letter-spacing: 2px;
  border-bottom: 1px solid black;
  padding-bottom: 5px;
}

/* 右側主內容 */
.main {
  width: 65%;
  padding: 40px;
  box-sizing: border-box;
}

/* 名字 */
.name {
  font-size: 32px;
  font-weight: bold;
  letter-spacing: 3px;
}

.title {
  letter-spacing: 5px;
  margin-bottom: 30px;
}

/* 區塊 */
.section {
  margin-bottom: 30px;
}

.section h3 {
  font-size: 16px;
  letter-spacing: 2px;
  border-bottom: 1px solid black;
  padding-bottom: 5px;
}

/* 深色模式 */
.dark {
  background-color: #1e1e1e;
}

.dark .container {
  background-color: #2c2c2c;
  color: white;
}

.dark .sidebar {
  background-color: #444;
}
</style>

</head>
<body>

<div class="container">

  <!-- 左側 -->
  <div class="sidebar">
    <img src="images/photo.jpg.jpg" class="profile-pic">

<audio id="bgm" autoplay loop playsinline>
  <source src="mp3/bg.mp3.mp3" type="audio/mpeg">
</audio>

    <h3>聯絡資訊</h3>
    <p>學號：114018045</p>
    <p>📧 a0970804658@gmail.com</p>

    <h3>技能</h3>
    <ul>
      <li>HTML / CSS</li>
      <li>JavaScript</li>
      <li>基礎程式設計</li>
    </ul>
  </div>

  <!-- 右側 -->
  <div class="main">
    <div class="name">洪文璿</div>
    <div class="title">學生 / 求職者</div>

    <div class="section">
      <h3>自我介紹</h3>
      <p>
        我是一名積極學習的學生，對網頁設計與程式開發有興趣，喜歡挑戰新技術並提升自己能力。
      </p>
    </div>

    <div class="section">
      <h3>學歷</h3>
      <p>中興高中</p>
    </div>

    <div class="section">
      <h3>經歷</h3>
      <p>尚無正式工作經驗，持續學習中</p>
    </div>

    <button onclick="changeTheme()">切換主題</button>
  </div>

</div>

<script>
function changeTheme() {
  document.body.classList.toggle("dark");
}
</script>
<audio id="bgm" autoplay loop playsinline>
  <source src="mp3/bg.mp3.mp3" type="audio/mpeg">
</audio>

<script>
  const audio = document.getElementById("bgm");

  // 嘗試直接播放
  audio.play().catch(() => {
    // 若被擋，快速解除靜音再播放
    audio.muted = true;
    audio.play();

    setTimeout(() => {
      audio.muted = false;
    }, 100);
  });
</script>
</body>
</html>
